databases:
  - name: climates-postgres
    plan: starter
    databaseName: climates
    user: climates

services:
  - type: web
    name: climates-cms
    runtime: node
    rootDir: cms
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /_health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 1337
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: climates-postgres
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: PUBLIC_URL
        sync: false
      - key: APP_KEYS
        sync: false
      - key: API_TOKEN_SALT
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: TRANSFER_TOKEN_SALT
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: climates-bff
    runtime: node
    rootDir: apps/bff
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        sync: false
      - key: STRAPI_URL
        sync: false
      - key: STRAPI_TOKEN
        sync: false
      - key: CACHE_TTL_SECONDS
        value: 60
      - key: PYTHON_BIN
        value: python3
      - key: PREDICT_TIMEOUT_MS
        value: 15000
