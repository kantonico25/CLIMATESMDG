services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  strapi:
    build:
      context: ./cms
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      PUBLIC_URL: ${STRAPI_PUBLIC_URL}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      ENCRYPTION_KEY: ${STRAPI_ENCRYPTION_KEY}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - strapi_uploads:/srv/app/public/uploads
    depends_on:
      - postgres
    restart: unless-stopped

  bff:
    build:
      context: ./apps/bff
    environment:
      NODE_ENV: production
      PORT: 4000
      STRAPI_URL: http://strapi:1337
      STRAPI_TOKEN: ${STRAPI_READ_TOKEN}
      CACHE_TTL_SECONDS: 60
      CORS_ORIGIN: ${WEB_ORIGIN}
    depends_on:
      - strapi
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_WEB_API_BASE_URL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    depends_on:
      - bff
      - strapi
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
    entrypoint: /bin/sh -c
    command: "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"

volumes:
  pgdata:
  strapi_uploads:
  certbot-etc:
  certbot-var:
